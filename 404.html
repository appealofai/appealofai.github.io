<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <meta name="theme-color" content="#001A33" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f0deb8" media="(prefers-color-scheme: light)">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Page not found on appealofai.">
    <title>Page not found | appealofai</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body class="legal-page error-page">
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="site-header" data-header aria-label="Site header">
      <a class="brand" href="/" aria-label="Appeal of AI home">
        <img class="brand-lockup" src="/assets/img/logo-with-name-horizontal.svg" alt="appealofai">
      </a>
      <div class="header-actions">
        <button class="icon-button" type="button" data-theme-toggle aria-label="Toggle light mode">
          <span class="theme-icon" aria-hidden="true">
            <svg class="moon-icon" viewBox="0 0 24 24" focusable="false">
              <path d="M12 3a6.2 6.2 0 0 0 9 7.6A9 9 0 1 1 12 3Z"></path>
            </svg>
            <svg class="sun-icon" viewBox="0 0 24 24" focusable="false">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9 17 7M7 17l-2.1 2.1"></path>
            </svg>
          </span>
        </button>
      </div>
      <nav class="site-nav" id="site-menu" data-menu aria-label="Primary navigation">
        <a href="/">Journal</a>
        <a href="/notes.html">Notes</a>
      </nav>
    </header>

    <main id="main" class="legal-page page-shell">
      <section class="error-hero" aria-labelledby="error-title">
        <p class="section-label">404</p>
        <h1 id="error-title">This page drifted out of the feed.</h1>
        <p>
          The note may have moved, been renamed, or never made it past draft.
        </p>
        <div class="error-actions">
          <a class="hero-cta" href="/">Journal</a>
          <a class="hero-cta hero-cta-secondary" href="/notes.html">Notes</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span><span class="footer-line"><span>&copy; 2026 appealofai</span><span>Personal opinion only</span><span>No professional advice</span><span>Verify sources and context</span></span></span>
      <nav aria-label="Legal navigation">
        <a class="x-link" href="https://x.com/appealofai"><span>@appealofai on &#120143;</span></a>
        <a href="/about.html">About</a>
        <a href="/legal.html">Legal</a>
        <a href="/terms.html">Terms</a>
        <a href="/privacy.html">Privacy</a>
      </nav>
    </footer>

    <script>
      (() => {
        const path = window.location.pathname;
        const lastSegment = path.split("/").pop() || "";
        if (!lastSegment || lastSegment.includes(".")) return;

        const target = path.endsWith("/") ? `${path}index.html` : `${path}.html`;
        window.location.replace(`${target}${window.location.search}${window.location.hash}`);
      })();
    </script>
    <script src="/script.js"></script>
  </body>
</html>
